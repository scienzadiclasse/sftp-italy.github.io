    <span>MENU</span>

  <!-- Social icons desktop -->
  <div style="display:flex; align-items:center;">
    <a href="https://www.youtube.com/@SFTPItalia" target="_blank" rel="noopener" aria-label="YouTube" title="YouTube">
      <i class="fa fa-youtube" aria-hidden="true"></i>
    </a>
    <a href="https://www.twitch.tv/scienzadiclasse" target="_blank" rel="noopener" aria-label="Twitch" title="Twitch">
      <i class="fa fa-twitch" aria-hidden="true"></i>
    </a>
    <a href="https://www.instagram.com/scienzadiclasse/" target="_blank" rel="noopener" aria-label="Instagram" title="Instagram">
      <i class="fa fa-instagram" aria-hidden="true"></i>
    </a>
    <a href="https://www.facebook.com/profile.php?id=100094782115818" target="_blank" rel="noopener" aria-label="Facebook" title="Facebook">
      <i class="fa fa-facebook" aria-hidden="true"></i>
    </a>
    <a href="https://open.spotify.com/show/7JSij05RVCmrLL5xc0Vey7" target="_blank" rel="noopener" aria-label="Spotify" title="Spotify">
      <i class="fa fa-spotify" aria-hidden="true"></i>
    </a>
    <a href="https://t.me/scienzadiclasse" target="_blank" rel="noopener" aria-label="Telegram" title="Telegram">
      <i class="fa fa-telegram" aria-hidden="true"></i>
    </a>
  </div>
</div>

<!-- Header mobile fisso (nascosto su desktop) -->
<header
  class="w3-top w3-hide-large"
  role="banner"
  style="
    height: 68px;
    background: var(--dark, #1e1e1e);
    border-bottom: 3px solid var(--red, #D42B1E);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px;
    z-index: 4;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  "
>
  <!-- Hamburger -->
  <button
    onclick="w3_open()"
    aria-label="Apri menu"
    aria-expanded="false"
    aria-controls="mySidebar"
    id="hamburger-btn"
    style="
      background: none; border: none; color: #fff;
      font-size: 1.35rem; cursor: pointer;
      padding: 8px; border-radius: 6px;
      min-width: 44px; min-height: 44px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    "
  >
    <i class="fa fa-bars" aria-hidden="true"></i>
  </button>

  <!-- Nome sito centrato -->
  <a
    href="/"
    style="
      font-family: var(--font-sans, 'Dosis', sans-serif);
      font-weight: 700; font-size: 1.1rem;
      color: #fff; letter-spacing: 0.06em;
      text-decoration: none;
      position: absolute; left: 50%; transform: translateX(-50%);
      white-space: nowrap;
    "
    aria-label="SftP Italia — Home"
  >
    SftP <span style="color:var(--red,#D42B1E);">ITALY</span>
  </a>

  <!-- Social rapidi: YouTube + Instagram + Telegram + Facebook + Spotify -->
  <div style="display:flex; align-items:center; gap:0; flex-shrink:0;">
    <a href="https://www.youtube.com/@SFTPItalia" target="_blank" rel="noopener" aria-label="YouTube"
       style="color:rgba(255,255,255,0.75); padding:7px 5px; font-size:1rem; min-width:36px; min-height:44px; display:flex; align-items:center; justify-content:center;">
      <i class="fa fa-youtube" aria-hidden="true"></i>
    </a>
    <a href="https://www.instagram.com/scienzadiclasse/" target="_blank" rel="noopener" aria-label="Instagram"
       style="color:rgba(255,255,255,0.75); padding:7px 5px; font-size:1rem; min-width:36px; min-height:44px; display:flex; align-items:center; justify-content:center;">
      <i class="fa fa-instagram" aria-hidden="true"></i>
    </a>
    <a href="https://t.me/scienzadiclasse" target="_blank" rel="noopener" aria-label="Telegram"
       style="color:rgba(255,255,255,0.75); padding:7px 5px; font-size:1rem; min-width:36px; min-height:44px; display:flex; align-items:center; justify-content:center;">
      <i class="fa fa-telegram" aria-hidden="true"></i>
    </a>
    <a href="https://www.facebook.com/profile.php?id=100094782115818" target="_blank" rel="noopener" aria-label="Facebook"
       style="color:rgba(255,255,255,0.75); padding:7px 5px; font-size:1rem; min-width:36px; min-height:44px; display:flex; align-items:center; justify-content:center;">
      <i class="fa fa-facebook" aria-hidden="true"></i>
    </a>
    <a href="https://open.spotify.com/show/7JSij05RVCmrLL5xc0Vey7" target="_blank" rel="noopener" aria-label="Spotify"
       style="color:rgba(255,255,255,0.75); padding:7px 5px; font-size:1rem; min-width:36px; min-height:44px; display:flex; align-items:center; justify-content:center;">
      <i class="fa fa-spotify" aria-hidden="true"></i>
    </a>
  </div>
</header>

<script>
(function () {
  var navbar = document.getElementById('navbar');
  if (!navbar) return;

  /* Sticky desktop navbar */
  var sticky = navbar.offsetTop;
  window.addEventListener('scroll', function () {
    navbar.classList.toggle('sticky', window.pageYOffset >= sticky);
  }, { passive: true });

  /* Desktop: hover sul pulsante apre la sidebar */
  var desktopBtn = document.getElementById('desktop-menu-btn');
  var sidebar    = document.getElementById('mySidebar');
  var hoverOpen  = null;
  var hoverClose = null;

  function isDesktop() { return window.innerWidth >= 993; }

  if (desktopBtn) {
    desktopBtn.addEventListener('mouseenter', function () {
      if (!isDesktop()) return;
      clearTimeout(hoverClose);
      hoverOpen = setTimeout(function () {
        w3_open(false); /* no overlay su desktop */
        desktopBtn.setAttribute('aria-expanded', 'true');
      }, 120);
    });
    desktopBtn.addEventListener('mouseleave', function () {
      clearTimeout(hoverOpen);
    });
  }

  if (sidebar) {
    sidebar.addEventListener('mouseleave', function () {
      if (!isDesktop()) return;
      hoverClose = setTimeout(function () {
        w3_close();
        if (desktopBtn) desktopBtn.setAttribute('aria-expanded', 'false');
      }, 350);
    });
    sidebar.addEventListener('mouseenter', function () {
      if (!isDesktop()) return;
      clearTimeout(hoverClose);
    });
  }

  /* Accessibilità: hamburger mobile */
  var mobileBtn = document.getElementById('hamburger-btn');
  if (mobileBtn) {
    mobileBtn.addEventListener('click', function () {
      var expanded = mobileBtn.getAttribute('aria-expanded') === 'true';
      mobileBtn.setAttribute('aria-expanded', String(!expanded));
    });
  }
})();
</script>
