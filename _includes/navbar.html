    border-bottom: 3px solid var(--red, #D42B1E);

    justify-content: space-between;
    padding: 0 8px 0 4px;
    z-index: 4;

>

      onclick="w3_open()"
      aria-label="Apri menu"
      aria-expanded="false"
      aria-controls="mySidebar"

      style="

        padding: 8px; border-radius: 6px;
        min-width: 44px; min-height: 44px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      "
    >

    </button>

        font-weight: 700; font-size: 0.9rem;
        color: #fff; letter-spacing: 0.05em;

<script>
(function () {
  var navbar = document.getElementById('navbar');
  if (!navbar) return;

  /* Sticky desktop navbar */
  var sticky = navbar.offsetTop;
  window.addEventListener('scroll', function () {
    navbar.classList.toggle('sticky', window.pageYOffset >= sticky);
  }, { passive: true });

  /* Desktop: hover sul pulsante apre la sidebar */
  var desktopBtn = document.getElementById('desktop-menu-btn');
  var sidebar    = document.getElementById('mySidebar');
  var hoverOpen  = null;
  var hoverClose = null;

  function isDesktop() { return window.innerWidth >= 993; }

  if (desktopBtn) {
    desktopBtn.addEventListener('mouseenter', function () {
      if (!isDesktop()) return;
      clearTimeout(hoverClose);
      hoverOpen = setTimeout(function () {
        w3_open(false); /* no overlay su desktop */
        desktopBtn.setAttribute('aria-expanded', 'true');
      }, 120);
    });
    desktopBtn.addEventListener('mouseleave', function () {
      clearTimeout(hoverOpen);
    });
  }

  if (sidebar) {
    sidebar.addEventListener('mouseleave', function () {
      if (!isDesktop()) return;
      hoverClose = setTimeout(function () {
        w3_close();
        if (desktopBtn) desktopBtn.setAttribute('aria-expanded', 'false');
      }, 350);
    });
    sidebar.addEventListener('mouseenter', function () {
      if (!isDesktop()) return;
      clearTimeout(hoverClose);
    });
  }

  /* Accessibilità: hamburger mobile */
  var mobileBtn = document.getElementById('hamburger-btn');
  if (mobileBtn) {
    mobileBtn.addEventListener('click', function () {
      var expanded = mobileBtn.getAttribute('aria-expanded') === 'true';
      mobileBtn.setAttribute('aria-expanded', String(!expanded));
    });
  }
})();
</script>
