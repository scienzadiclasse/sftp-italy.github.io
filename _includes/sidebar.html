<!-- Overlay: tap fuori dalla sidebar per chiudere -->
<div
  id="myOverlay"
  onclick="w3_close()"
  style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.55); z-index:9998; cursor:pointer;"
  title="Chiudi menu"
  aria-hidden="true"
></div>

<style>
.sidebar-social-link {
  color: rgba(255,255,255,0.45);
  font-size: 1rem;
  width: 34px; height: 34px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  text-decoration: none;
  transition: color .2s, background .2s, border-color .2s, transform .2s;
}
.sidebar-social-link:hover {
  color: #fff;
  background: var(--red, #D42B1E);
  border-color: var(--red, #D42B1E);
  transform: translateY(-2px);
}
</style>

<script>
/* showOverlay: true = mostra overlay + blocca scroll (mobile)
                false = solo slide (hover desktop) */
function w3_open(showOverlay) {
  var useOverlay = showOverlay !== false;
  var sidebar = document.getElementById('mySidebar');
  var overlay = document.getElementById('myOverlay');
  if (sidebar) {
    sidebar.classList.add('sidebar-open');
    sidebar.style.transform = 'translateX(0)';
  }
  if (overlay && useOverlay) overlay.style.display = 'block';
  var btn = document.getElementById('hamburger-btn');
  if (btn) btn.setAttribute('aria-expanded', 'true');
  if (useOverlay) document.body.style.overflow = 'hidden';
}

function w3_close() {
  var sidebar = document.getElementById('mySidebar');
  var overlay = document.getElementById('myOverlay');
  if (sidebar) {
    sidebar.classList.remove('sidebar-open');
    sidebar.style.transform = 'translateX(-100%)';
  }
  if (overlay) overlay.style.display = 'none';
  var btn = document.getElementById('hamburger-btn');
  if (btn) btn.setAttribute('aria-expanded', 'false');
  document.body.style.overflow = '';
}

function w3_toggle() {
  var sidebar = document.getElementById('mySidebar');
  if (sidebar && sidebar.classList.contains('sidebar-open')) {
    w3_close();
  } else {
    w3_open(false); /* desktop click: no overlay */
  }
}
</script>
