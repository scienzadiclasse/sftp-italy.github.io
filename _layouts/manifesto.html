---
layout: default
---

<style>
  /* ============================================================
     MANIFESTO — pagina dedicata (.mn- prefisso)
     ============================================================ */
  .mn-page { background: #fff; color: #111; font-family: 'Dosis', sans-serif; }

  /* HERO */
  .mn-hero {
    background: #111;
    color: #fff;
    padding: 80px 32px 60px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .mn-hero::before {
    content: 'MANIFESTO';
    position: absolute; inset: 0;
    font-family: 'Dosis', sans-serif;
    font-weight: 700;
    font-size: clamp(8rem, 22vw, 18rem);
    letter-spacing: -0.02em;
    color: rgba(255,255,255,0.05);
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 1;
  }
  .mn-hero-inner {
    position: relative;
    z-index: 2;
    max-width: 920px;
    margin: 0 auto;
  }
  .mn-logo {
    width: 96px; height: 96px;
    margin: 0 auto 22px;
    border-radius: 50%;
    overflow: hidden;
    background: #fff;
    border: 3px solid #D40035;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 24px rgba(0,0,0,0.4);
  }
  .mn-logo img {
    width: 88%; height: 88%;
    object-fit: contain;
    display: block;
  }
  .mn-kicker {
    font-family: 'Dosis', sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #D40035;
    margin-bottom: 16px;
  }
  .mn-title {
    margin: 0 !important;
    font-family: 'Dosis', sans-serif !important;
    font-weight: 700;
    font-size: clamp(2.8rem, 8vw, 5.5rem);
    line-height: 0.98;
    letter-spacing: -0.02em;
    color: #fff !important;
  }
  .mn-title span { color: #D40035; }

  /* Bordo rosso sotto hero */
  .mn-hero-divider {
    height: 4px;
    background: #D40035;
  }

  /* CORPO */
  .mn-body {
    max-width: 820px;
    margin: 0 auto;
    padding: 64px 32px 56px;
    font-family: 'Lora', serif;
    font-size: 1.12rem;
    line-height: 1.85;
    color: #222;
    text-align: justify;
    hyphens: auto; -webkit-hyphens: auto;
  }
  .mn-body p { margin: 0 0 1.3em; }
  .mn-body p:first-of-type { font-size: 1.08em; color: #000; }
  .mn-body h1, .mn-body h2 {
    font-family: 'Dosis', sans-serif !important;
    font-weight: 700;
    line-height: 1.15;
    color: #000;
    margin: 2.4em 0 0.5em !important;
    padding-bottom: 0.35em;
    border-bottom: 3px solid #D40035;
    text-align: left;
  }
  .mn-body h1 { font-size: clamp(1.7rem, 3.6vw, 2.4rem); }
  .mn-body h2 { font-size: clamp(1.4rem, 2.8vw, 1.85rem); }
  .mn-body h3 {
    font-family: 'Dosis', sans-serif !important;
    font-weight: 700;
    font-size: clamp(1.15rem, 2.4vw, 1.4rem);
    margin: 1.8em 0 0.4em !important;
    color: #222;
  }
  .mn-body strong, .mn-body b { color: #000; }
  .mn-body blockquote {
    margin: 2em 0;
    padding: 22px 28px 22px 32px;
    border-left: 5px solid #D40035;
    background: #fde6ec;
    color: #111;
    font-style: italic;
    font-size: 1.1em;
  }
  .mn-body blockquote p { margin: 0; }
  .mn-body a {
    color: #D40035;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .mn-body a:hover { color: #a8002a; }

  /* CTA finale */
  .mn-cta {
    background: #f7f5f5;
    border-top: 1px solid #e8e8e8;
    padding: 56px 32px;
  }
  .mn-cta-inner {
    max-width: 920px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 32px;
    align-items: center;
  }
  .mn-cta h2 {
    margin: 0 0 8px;
    font-family: 'Dosis', sans-serif !important;
    font-weight: 700;
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    color: #D40035;
    padding-bottom: 6px;
    border-bottom: 3px solid #D40035;
    display: inline-block;
  }
  .mn-cta p {
    font-family: 'Lora', serif;
    font-size: 1.05rem;
    line-height: 1.55;
    color: #222;
    margin: 14px 0 0;
  }
  .mn-cta-buttons {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .mn-btn {
    background: #D40035;
    color: #fff !important;
    padding: 14px 22px;
    font-family: 'Dosis', sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none !important;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: background .2s, transform .15s;
  }
  .mn-btn:hover { background: #a8002a; transform: translateY(-1px); }
  .mn-btn--outline {
    background: transparent;
    color: #D40035 !important;
    border: 2px solid #D40035;
    padding: 12px 20px;
  }
  .mn-btn--outline:hover { background: #D40035; color: #fff !important; }

  @media (max-width: 768px) {
    .mn-hero { padding: 48px 18px 36px; }
    .mn-logo { width: 76px; height: 76px; margin-bottom: 16px; }
    .mn-body { padding: 40px 18px 40px; font-size: 1.02rem; }
    .mn-cta { padding: 36px 18px; }
    .mn-cta-inner { grid-template-columns: 1fr; }
  }
</style>

<div class="mn-page">

  <header class="mn-hero">
    <div class="mn-hero-inner">
      <div class="mn-logo">
        <img src="/img/SftPItalia_logo.png" alt="Science for the People Italia">
      </div>
      <div class="mn-kicker">↳ Documento</div>
      <h1 class="mn-title">Il nostro <span>manifesto.</span></h1>
    </div>
  </header>
  <div class="mn-hero-divider"></div>

  <div class="mn-body">
    {{ content }}
  </div>

  <section class="mn-cta">
    <div class="mn-cta-inner">
      <div>
        <h2>Partecipa</h2>
        <p>Puoi entrare a far parte di SftP Italia seguendoci sui nostri canali social o partecipando attivamente alle nostre discussioni nel canale Telegram.</p>
      </div>
      <div class="mn-cta-buttons">
        <a href="https://t.me/scienzadiclasse" target="_blank" rel="noopener" class="mn-btn">Telegram ↗</a>
        <a href="mailto:scienzadiclasse@gmail.com" class="mn-btn mn-btn--outline">Scrivici</a>
      </div>
    </div>
  </section>

</div>
