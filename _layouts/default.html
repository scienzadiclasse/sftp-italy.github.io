<!DOCTYPE html>
<html lang="{{ page.locale | default: 'it' }}">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5, user-scalable=yes">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

  <link rel="icon" href="/img/SftPItalia_logo.png" type="image/png">

  <meta property="og:title" content="{{ page.title | default: site.title }}" />
  <meta property="og:description" content="{{ page.description | default: site.description }}" />
  <meta property="og:image" content="{{ page.image | default: '/img/logo.jpg' }}" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}" />
  <meta property="og:site_name" content="{{ site.title }}" />
  <meta property="og:locale" content="{{ page.locale | default: 'it_IT' }}" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ page.title | default: site.title }}" />
  <meta name="twitter:description" content="{{ page.description | default: site.description }}" />
  <meta name="twitter:image" content="{{ page.image | default: '/img/logo.jpg' }}" />

  {% if page.layout == 'post' %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": {{ page.title | jsonify }},
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "author": { "@type": "Person", "name": {{ page.author | default: "SFTP Italia" | jsonify }} },
    "image": {{ page.image | default: "/img/smol_logo.png" | jsonify }},
    "publisher": {
      "@type": "Organization",
      "name": "SFTP Italia",
      "logo": { "@type": "ImageObject", "url": "/img/smol_logo.png" }
    }
  }
  </script>
  {% endif %}

  <!-- Override globale: rimuove i conflitti del CSS legacy con il nuovo topbar -->
  <style>
    /* Sidebar resta in DOM (serve all'hamburger mobile) ma niente padding-top forzato */
    body { margin: 0; }
    .w3-main.site-main, .site-main {
      padding-top: 0 !important;
      margin-top: 0 !important;
      margin-left: 0 !important;
    }
    /* Nasconde il vecchio header mobile fisso, sostituito dal nuovo topbar */
    body > header.w3-top { display: none !important; }
    /* Zoom dinamico su mobile: permette pinch e tap-to-zoom */
    body { touch-action: pan-x pan-y pinch-zoom; }
    /* Lightbox */
    #sftp-lightbox {
      display: none; position: fixed; inset: 0; z-index: 99999;
      background: rgba(0,0,0,0.92); cursor: zoom-out;
      align-items: center; justify-content: center;
    }
    #sftp-lightbox.open { display: flex; }
    #sftp-lightbox img {
      max-width: 96vw; max-height: 96vh;
      object-fit: contain; box-shadow: 0 4px 40px rgba(0,0,0,0.6);
    }
    /* Immagini cliccabili negli articoli */
    .ma-body img, .mn-body img { cursor: zoom-in; }
  </style>
</head>

<body>

  <!-- Splash d'apertura: brand a schermo pieno che si ripone nella topbar -->
  {% include splash.html %}

  <!-- Sidebar (resta per accessibilità mobile via hamburger del topbar) -->
  {% include sidebar.html %}

  <!-- NUOVO topbar magazine -->
  {% include navbar.html %}

  <!-- Main content (full width) -->
  <main class="site-main" role="main">
    {% if page.layout == 'post' or page.full_width %}
      {{ content }}
    {% else %}
      <div class="site-content">
        {{ content }}
      </div>
    {% endif %}
  </main>

  {% include footer.html %}

  <!-- Lightbox zoom dinamico -->
  <div id="sftp-lightbox" role="dialog" aria-modal="true" aria-label="Immagine ingrandita"
       onclick="this.classList.remove('open')">
    <img id="sftp-lightbox-img" src="" alt="">
  </div>

  <script>
    // Lightbox: tap/click su immagini .ma-body e .mn-body
    document.addEventListener('DOMContentLoaded', function() {
      var lb = document.getElementById('sftp-lightbox');
      var lbImg = document.getElementById('sftp-lightbox-img');
      document.querySelectorAll('.ma-body img, .mn-body img').forEach(function(img) {
        img.addEventListener('click', function() {
          lbImg.src = this.src;
          lbImg.alt = this.alt;
          lb.classList.add('open');
        });
      });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') lb.classList.remove('open');
      });
    });

    // Modal Image Gallery
    function onClick(element) {
      var modal = document.getElementById("modal01");
      if (modal) {
        document.getElementById("img01").src = element.src;
        modal.style.display = "block";
        var captionText = document.getElementById("caption");
        if (captionText) captionText.innerHTML = element.alt;
      }
    }
  </script>

  <!-- Animazioni globali: scroll-reveal + micro-interazioni -->
  {% include animations.html %}

</body>
</html>
